<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 76" fill="none">
  <!-- Colored square dots -->
  <!-- Orange - top left (above h) -->
  <rect x="16" y="7" width="11" height="11" fill="#E8852A"/>
  <!-- Green - top center (above yli) -->
  <rect x="96" y="4" width="11" height="11" fill="#8DC63F"/>
  <!-- Red - top right (above k) -->
  <rect x="222" y="7" width="11" height="11" fill="#E53935"/>
  <!-- Blue - bottom left (below h) -->
  <rect x="8"  y="60" width="11" height="11" fill="#29ABE2"/>
  <!-- Purple - bottom center-right (below n) -->
  <rect x="166" y="63" width="11" height="11" fill="#9B59B6"/>
  <!-- Cyan - bottom right (below k) -->
  <rect x="238" y="60" width="11" height="11" fill="#26C6DA"/>

  <!-- hylink wordmark -->
  <text
    x="130"
    y="54"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-weight="800"
    font-size="44"
    fill="#6B7A8D"
    text-anchor="middle"
    letter-spacing="-1"
  >hylink</text>
</svg>
